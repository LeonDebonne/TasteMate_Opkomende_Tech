<svg width="100%" viewBox="0 0 680 1060" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flowchart schermbeheer</title>
  <desc>Stroomdiagram van het schermbeheer programma op basis van afstandssensor en muisinteractie</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START -->
  <g>
    <rect x="230" y="30" width="220" height="44" rx="22" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
    <text x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Programma opstarten</text>
  </g>
  <line x1="340" y1="74" x2="340" y2="114" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- INIT -->
  <g>
    <rect x="210" y="114" width="260" height="56" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
    <text x="340" y="134" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Scherm uitzetten</text>
    <text x="340" y="154" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Starttoestand: scherm uit</text>
  </g>
  <line x1="340" y1="170" x2="340" y2="210" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMANT 1: persoon gedetecteerd? -->
  <g>
    <path d="M340,210 L470,270 L340,330 L210,270 Z" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="340" y="262" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Persoon</text>
    <text x="340" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">gedetecteerd?</text>
  </g>
  <!-- NEE rechts naar Wacht-box -->
  <line x1="470" y1="270" x2="538" y2="270" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="258" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">NEE</text>
  <g>
    <rect x="538" y="248" width="110" height="44" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
    <text x="593" y="264" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Wacht</text>
    <text x="593" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">0.2s pauze</text>
  </g>
  <!-- Teruglooplijn NEE: rechts langs, terug naar diamant 1 -->
  <path d="M648 270 L662 270 L662 200 L340 200" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- JA omlaag -->
  <text x="296" y="345" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">JA</text>
  <line x1="340" y1="330" x2="340" y2="370" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SCHERM AANZETTEN -->
  <g>
    <rect x="210" y="370" width="260" height="56" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
    <text x="340" y="390" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Scherm aanzetten</text>
    <text x="340" y="410" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">wlr-randr aan + draaien + buzzer</text>
  </g>
  <line x1="340" y1="426" x2="340" y2="466" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMANT 2: persoon nog aanwezig? -->
  <g>
    <path d="M340,466 L470,526 L340,586 L210,526 Z" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="340" y="518" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Persoon nog</text>
    <text x="340" y="536" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">aanwezig?</text>
  </g>
  <!-- JA rechts: timer resetten -->
  <line x1="470" y1="526" x2="538" y2="526" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="514" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">JA</text>
  <g>
    <rect x="538" y="504" width="110" height="44" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
    <text x="593" y="520" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Timer reset</text>
    <text x="593" y="536" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Activiteit bijwerken</text>
  </g>
  <!-- Teruglooplijn JA: rechts langs terug naar diamant 2 -->
  <path d="M648 526 L662 526 L662 456 L340 456" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NEE omlaag -->
  <text x="296" y="601" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">NEE</text>
  <line x1="340" y1="586" x2="340" y2="626" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMANT 3: muis bewogen? -->
  <g>
    <path d="M340,626 L470,686 L340,746 L210,686 Z" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="340" y="678" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Muis</text>
    <text x="340" y="696" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">bewogen?</text>
  </g>
  <!-- JA rechts: timer + muispositie -->
  <line x1="470" y1="686" x2="538" y2="686" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="674" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">JA</text>
  <g>
    <rect x="538" y="664" width="110" height="44" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
    <text x="593" y="680" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Timer reset</text>
    <text x="593" y="696" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Muispositie opslaan</text>
  </g>
  <!-- Teruglooplijn JA: rechts langs terug naar diamant 2 -->
  <path d="M648 686 L662 686 L662 456 L340 456" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NEE omlaag -->
  <text x="296" y="761" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">NEE</text>
  <line x1="340" y1="746" x2="340" y2="786" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMANT 4: 10s geen activiteit? -->
  <g>
    <path d="M340,786 L470,846 L340,906 L210,846 Z" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="340" y="838" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">10s geen</text>
    <text x="340" y="856" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">activiteit?</text>
  </g>
  <!-- NEE links: terug naar diamant 2 -->
  <line x1="210" y1="846" x2="140" y2="846" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <path d="M140 846 L140 456 L210 456" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="170" y="834" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">NEE</text>

  <!-- Ctrl+C rechts van diamant 4 -->
  <line x1="470" y1="846" x2="538" y2="846" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="538" y="822" width="110" height="48" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
    <text x="593" y="840" text-anchor="middle" dominant-baseline="central" fill="rgb(245,196,179)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Ctrl+C</text>
    <text x="593" y="858" text-anchor="middle" dominant-baseline="central" fill="rgb(240,153,123)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Buzzer + scherm uit</text>
  </g>

  <!-- JA omlaag naar scherm uitzetten -->
  <text x="296" y="921" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">JA</text>
  <line x1="340" y1="906" x2="340" y2="946" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SCHERM UITZETTEN -->
  <g>
    <rect x="210" y="946" width="260" height="56" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
    <text x="340" y="966" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Scherm uitzetten</text>
    <text x="340" y="986" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">wlr-randr --off</text>
  </g>
  <!-- Teruglooplijn: scherm uit → terug naar diamant 1 -->
  <line x1="210" y1="974" x2="80" y2="974" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <path d="M80 974 L80 200 L210 200" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
